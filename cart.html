<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body class="bg-[#f9f9f9]">
    <nav
      id="navbar"
      class="bg-white fixed w-full z-20 top-0 start-0 transition-all duration-300"
    >
      <div
        class="max-w-screen-2xl flex flex-wrap items-center justify-between mx-auto p-4"
      >
        <a
          href="./homePage.html"
          class="flex items-center space-x-3 rtl:space-x-reverse"
        >
          <span
            class="self-center text-[32px] font-Hedvig font-[400] text-main leading-[43px] whitespace-nowrap"
          >
            Trendify
          </span>
        </a>

        <div class="flex md:order-2 space-x-3 rtl:space-x-reverse items-center">
          <a
            href="./cart.html"
            id="cartIcon"
            class="bg-transparent relative text-black text-[25px]"
          >
            <i class="fa-solid fa-cart-shopping fa-1xl"></i>
            <span
              id="cartCount"
              class="hidden absolute top-0 right-0 flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white translate-x-1/4 -translate-y-1/4 bg-primary rounded-full"
            >
              0
            </span>
          </a>

          <a
            href="./wishlist.html"
            id="wishlistIcon"
            class="bg-transparent text-black relative text-[25px]"
          >
            <i class="fa-solid fa-heart"></i>
            <span
              id="wishlistCount"
              class="hidden absolute top-0 right-0 flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white translate-x-1/4 -translate-y-1/4 bg-primary rounded-full"
            >
              0
            </span>
          </a>

          <button
            id="menuToggle"
            type="button"
            class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-black rounded-lg md:hidden hover:bg-gray-100 hover:text-black focus:outline-none"
          >
            <span class="sr-only">Open main menu</span>
            <svg
              class="w-5 h-5"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 17 14"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M1 1h15M1 7h15M1 13h15"
              />
            </svg>
          </button>
        </div>

        <div
          id="navbarMenu"
          class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
        >
          <ul
            class="flex flex-col bg-white md:bg-transparent p-4 md:p-0 mt-4 font-medium border border-gray-100 rounded-lg md:space-x-8 md:flex-row md:mt-0 md:border-0"
          >
            <li>
              <a
                href="./homePage.html"
                class="nav-link block py-2 px-3 capitalize text-black rounded-sm hover:text-primary md:p-0"
              >
                home
              </a>
            </li>

            <li>
              <a
                href="./products.html"
                class="nav-link block py-2 px-3 capitalize text-black rounded-sm hover:text-primary md:p-0"
              >
                products
              </a>
            </li>

            <li>
              <a
                href="./blog.html"
                class="nav-link block py-2 px-3 capitalize text-black rounded-sm hover:text-primary md:p-0"
              >
                blog
              </a>
            </li>

            <li>
              <a
                href="./contactus.html"
                class="nav-link block py-2 px-3 capitalize text-black rounded-sm hover:text-primary md:p-0"
              >
                contact us
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section class="py-20">
      <div class="container mx-auto px-8">
        <div id="cartWrapper"></div>

        <section
          id="emptyCartSection"
          class="hidden py-12 text-center min-h-[50vh] bg-center bg-no-repeat bg-contain"
          style="background-image: url(&quot;./images/emptyCart.png&quot;)"
        ></section>
      </div>
    </section>

    <div
      id="popupModal"
      class="hidden overflow-y-auto bg-[rgba(0,0,0,0.4)] overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 max-h-full"
    >
      <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-sm">
          <button
            onclick="closeModal()"
            type="button"
            class="absolute top-3 end-2.5 text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center"
          >
            <svg
              class="w-3 h-3"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 14 14"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
              />
            </svg>
          </button>

          <div class="p-4 md:p-5 text-center">
            <svg
              class="mx-auto mb-4 text-gray-400 w-12 h-12"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 20 20"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 11V6m0 8h.01M19 10a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
              />
            </svg>

            <h3 class="mb-5 text-lg font-normal text-gray-500 capitalize">
              Are you sure you want to delete all product?
            </h3>

            <button
              onclick="clearUserCart()"
              type="button"
              class="text-white bg-red-600 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm inline-flex items-center px-5 py-2.5 text-center"
            >
              Yes, I'm sure
            </button>

            <button
              onclick="closeModal()"
              type="button"
              class="py-2.5 px-5 ms-3 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700"
            >
              No, cancel
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="./node_modules/flowbite/dist/flowbite.min.js"></script>
    <script src="cart.js"></script>
  </body>
</html>
