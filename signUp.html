<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link href="./output.css" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="bg-[#f6f6f6] min-h-screen">
    <div class="section min-h-screen flex items-center justify-center py-20">
      <div class="container px-8">
        <div class="w-full max-w-[700px] mx-auto">
          <div class="register-form flex flex-col gap-6 justify-center">
            <div class="info text-center">
              <h2 class="font-popins text-[32px] leading-[48px] text-[#090F41]">
                Create a Account
              </h2>
              <span class="font-popins font-normal text-lg text-[#667085]">
                Create a new account
              </span>
            </div>

            <form id="registerForm" class="flex flex-col gap-6">
              <div class="user-name flex flex-col relative gap-2">
                <label
                  for="name"
                  class="font-popins font-medium text-lg text-[#090F41]"
                >
                  User Name
                </label>

                <input
                  id="name"
                  placeholder="Mohammed"
                  type="text"
                  class="rounded-[8px] border border-white bg-white pl-4 pr-4 py-3 focus:outline-none"
                />

                <div
                  id="nameError"
                  class="hidden p-4 text-sm text-red-800 rounded-lg bg-red-50"
                ></div>
              </div>

              <div class="Email flex flex-col relative gap-2">
                <label
                  for="email"
                  class="font-popins font-medium text-lg text-[#090F41]"
                >
                  E-Mail
                </label>

                <input
                  id="email"
                  placeholder="Mohammed@gmail.com"
                  type="email"
                  class="rounded-[8px] border border-white bg-white pl-12 pr-4 py-3 focus:outline-none"
                />

                <span
                  class="text-[#8B5E35] absolute left-4 top-[50px] pointer-events-none"
                >
                  <i class="fa-regular fa-envelope"></i>
                </span>

                <div
                  id="registerEmailError"
                  class="hidden p-4 text-sm text-red-800 rounded-lg bg-red-50"
                ></div>
              </div>

              <div class="password flex flex-col relative gap-2">
                <label
                  for="password"
                  class="font-popins font-medium text-lg text-[#090F41]"
                >
                  Password
                </label>

                <input
                  id="password"
                  placeholder="••••••••"
                  type="password"
                  class="rounded-[8px] border border-white bg-white pl-12 pr-4 py-3 focus:outline-none"
                />

                <span
                  class="text-[#8B5E35] absolute left-4 top-[50px] pointer-events-none"
                >
                  <i class="fa-solid fa-lock"></i>
                </span>

                <div
                  id="registerPasswordError"
                  class="hidden p-4 text-sm text-red-800 rounded-lg bg-red-50"
                ></div>
              </div>

              <div class="rePassword flex flex-col relative gap-2">
                <label
                  for="rePassword"
                  class="font-popins font-medium text-lg text-[#090F41]"
                >
                  Re-Password
                </label>

                <input
                  id="rePassword"
                  placeholder="••••••••"
                  type="password"
                  class="rounded-[8px] border border-white bg-white pl-12 pr-4 py-3 focus:outline-none"
                />

                <span
                  class="text-[#8B5E35] absolute left-4 top-[50px] pointer-events-none"
                >
                  <i class="fa-solid fa-lock"></i>
                </span>

                <div
                  id="rePasswordError"
                  class="hidden p-4 text-sm text-red-800 rounded-lg bg-red-50"
                ></div>
              </div>

              <div class="phone flex flex-col relative gap-2">
                <label
                  for="phone"
                  class="font-popins font-medium text-lg text-[#090F41]"
                >
                  Phone
                </label>

                <input
                  id="phone"
                  placeholder="01091945839"
                  type="text"
                  class="rounded-[8px] border border-white bg-white pl-12 pr-4 py-3 focus:outline-none"
                />

                <span
                  class="text-[#8B5E35] absolute left-4 top-[50px] pointer-events-none"
                >
                  <i class="fa-solid fa-mobile-screen-button"></i>
                </span>

                <div
                  id="phoneError"
                  class="hidden p-4 text-sm text-red-800 rounded-lg bg-red-50"
                ></div>
              </div>

              <div class="flex items-center gap-2">
                <input
                  id="terms"
                  type="checkbox"
                  class="w-4 h-4 border border-gray-300 rounded-sm bg-gray-50"
                />
                <label for="terms" class="text-sm font-medium text-gray-700">
                  I agree with the
                  <a href="#" class="text-[#8B5E35] underline">
                    terms and conditions
                  </a>
                </label>
              </div>

              <div
                id="termsError"
                class="hidden p-4 text-sm text-red-800 rounded-lg bg-red-50"
              ></div>

              <button
                id="signUp"
                type="submit"
                class="text-white bg-[#8B5E35] hover:bg-[rgba(139,95,53,0.8)] disabled:bg-gray-400 cursor-pointer font-medium rounded-lg text-sm px-5 py-3 text-center transition-all duration-300"
              >
                <span id="registerButtonText">Register new account</span>
                <span id="registerSpinner" class="hidden">
                  <i class="fas fa-spin fa-spinner"></i>
                </span>
              </button>

              <p
                class="font-popins font-medium text-lg text-[#667085] text-center"
              >
                Already have an account?
                <a
                  href="./index.html"
                  class="text-[#8B5E35] cursor-pointer underline"
                >
                  Log In
                </a>
              </p>

              <p
                id="userMessage"
                class="hidden p-4 mt-2 text-white rounded text-lg"
              ></p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
